name: Build Next.js Application

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Minimal permissions - security best practice
permissions:
  contents: read
  actions: read
  id-token: write  # For artifact attestations

env:
  NODE_VERSION: '22.x'  # Adjust to your Node.js version

jobs:
  build:
    runs-on: windows-latest  # GitHub-hosted runner - safe for public repos

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7 - pinned to SHA
        with:
          persist-credentials: false  # Don't persist credentials

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8  # v4.0.2
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting (optional)
        run: npm run lint
        continue-on-error: false

      - name: Build Next.js static export
        run: npm run build
        env:
          NODE_ENV: production

      - name: Generate build manifest
        run: |
          $manifest = @{
            build_sha = "${{ github.sha }}"
            build_ref = "${{ github.ref }}"
            build_time = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            triggered_by = "${{ github.actor }}"
            repository = "${{ github.repository }}"
          }
          $manifest | ConvertTo-Json | Out-File -FilePath .\out\build-manifest.json -Encoding UTF8
        shell: powershell

      - name: Upload build artifacts
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808  # v4.3.3
        with:
          name: nextjs-build-${{ github.sha }}
          path: out/
          retention-days: 7
          if-no-files-found: error

      # Attest the build provenance for supply chain security
      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@1c608d11d69870c2092266b3f9a6f3abbf17002c  # v1.4.3
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          subject-path: 'out/**/*'

  trigger-deployment:
    needs: build
    runs-on: ubuntu-latest
    # CRITICAL: Only trigger deployment from master branch pushes, never from PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read

    steps:
      - name: Trigger private deployment workflow
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.DEPLOYMENT_TRIGGER_TOKEN }}
          script: |
            const response = await github.rest.actions.createWorkflowDispatch({
              owner: 'codewriter3000',  // Replace with your GitHub username/org
              repo: 'carbon-type-deployment',  // Replace with your private repo name
              workflow_id: 'deploy.yml',
              ref: 'master',
              inputs: {
                build_sha: '${{ github.sha }}',
                public_repo: '${{ github.repository }}',
                triggered_by: '${{ github.actor }}',
                build_artifact: 'nextjs-build-${{ github.sha }}'
              }
            });
            console.log('Deployment triggered successfully');

      - name: Post deployment trigger status
        if: always()
        run: |
          echo "::notice::Deployment workflow triggered in private repository"
          echo "::notice::Build SHA: ${{ github.sha }}"
          echo "::notice::Triggered by: ${{ github.actor }}"